        </div>

        </div>

    </div>  
      <div class="container">
        <div class="relative">
        <div class="bg-[url('./images/hero.png')] bg-cover pb-32 lg:h-[100vh] ">

        </div>
        <div class="lg:w-[430px] w-96 absolute top-12"><img src="./images/makebold.svg" alt=""> <!--makebold-->
        </div>
        <div class=" lg:w-72 lg:pt-2 sm:pt-60 absolute  flex flex-col bottom-2 gap-2 left-12 ">
            
            <button class="text-lg bg-white py-2 text-center border-black border-[3px] text-bold rounded-lg w-72 h-18">Apply now througth clearing</button>
            <button class="text-lg bg-white py-2 text-center border-black border-[3px] text-bold rounded-lg w-72 h-18">Learn more about clearing</button>
          </div>
</div>
          <div class="divs grid lg:grid-cols-4 grid-cols-2 bg-red-100 px-6 lg:mb-24 pb-3 ">

          </div>

      <div class="bg-[#ffcd6e] pl-6 space-y-4">
        <div class="font-bold text-gray-800 text-2xl"><p>There are places available across a number of our halls. If you apply to Goldsmiths for 2025 entry, you will receive a guaranteed offer of accommodation.</p></div>
        <div class="text-gray-600  border border-gray-700 border-b-4 flex justify-center bg-white w-40 py-3"><button>How to apply</button></div>
        <div><img src="./images/Accommodation-homepage.jpeg" alt=""></div>
